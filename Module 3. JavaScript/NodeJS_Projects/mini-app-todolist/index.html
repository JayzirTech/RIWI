<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App (To Do List)</title>
</head>

<body class="min-h-full flex flex-col items-center justify-center p-6 bg-emerald-600">

    <main class="w-full max-w-xl bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 space-y-6">

        <header class="space-y-2">
            <h1
                class="text-2xl font-bold text-center bg-gradient-to-r from-emerald-400 to-teal-500 bg-clip-text text-transparent">
                My To Do List
            </h1>
            <p class="text-xl text-slate-400 text-center">
                Type a note below, then press Add. Your notes will be automatically saved in your browser.
            </p>
        </header>

        <form id="notesForm" class="flex gap-2">
            <input type="text" id="inputNote" placeholder="Type a new note..." autocomplete="on"
                class="flex-1 px-4 py-2 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-emerald-500 text-sm placeholder-slate-500 transition-colors text-white" />
            <button type="submit"
                class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white font-medium text-sm rounded-xl transition-colors shadow-lg shadow-emerald-900/20">
                Add
            </button>
        </form>

        <section class="border-t border-slate-700 pt-4">
            <ul id="notesList" class="space-y-2 max-h-60 overflow-y-auto pr-1">

            </ul>
        </section>

    </main>

    <script type="module" src="./src/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
